<section class="auth-container">
  <div class="auth-box">
    <h1>System Access</h1>
    <p>Enter actor credentials from the database.</p>

    <form (ngSubmit)="performLogin()">
      <label for="fname-input">First Name</label>
      <input
        id="fname-input"
        type="text"
        name="fname"
        [(ngModel)]="fname"
        [disabled]="busy"
      />

      <label for="lname-input">Last Name</label>
      <input
        id="lname-input"
        type="text"
        name="lname"
        [(ngModel)]="lname"
        [disabled]="busy"
      />

      <button type="submit" [disabled]="busy">
        {{ busy ? 'Processing...' : 'Access System' }}
      </button>
    </form>

    <p class="notification" *ngIf="msg">{{ msg }}</p>
  </div>
</section>
