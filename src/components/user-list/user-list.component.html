<aside class="section">
  <h2>Actor Registry</h2>

  <div class="section-list">
    <article
      class="actor-card"
      *ngFor="let act of displayed"
      (click)="toggleActor(act.id)"
    >
      <p><strong>{{ act.first }} {{ act.last }}</strong></p>
      <p>{{ act.email }}</p>

      <div class="actor-actions" *ngIf="activeId === act.id">
        <button type="button" (click)="selectActor(act)">View Profile</button>
        <button type="button" (click)="clearActor()">Close</button>
      </div>
    </article>

    <p *ngIf="displayed.length === 0" class="placeholder">
      No actors match filter.
    </p>
  </div>
</aside>
