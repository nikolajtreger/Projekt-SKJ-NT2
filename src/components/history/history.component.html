<aside class="section">
  <h2>Session History</h2>

  <div class="history-list">
    <article class="history-entry" *ngFor="let rec of records">
      <p><strong>{{ rec.actorName }}</strong></p>
      <p>Started: {{ rec.tIn | date : 'HH:mm:ss' }}</p>
      <p>Ended: {{ rec.tOut | date : 'HH:mm:ss' }}</p>
    </article>

    <p *ngIf="records.length === 0" class="placeholder">
      No session history yet.
    </p>
  </div>
</aside>
