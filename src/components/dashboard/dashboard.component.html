<section class="main-view" (click)="onPageInteraction()">
  <app-top-bar
    [currentActor]="currentActor"
    [sessionStart]="sessionStart"
    [clicks]="clicks"
    [query]="query"
    (queryChange)="onQueryChange($event)"
    (logoutEvent)="onLogout()"
  ></app-top-bar>

  <div class="content-grid">
    <app-user-list (actorSelected)="onActorSelected($event)"></app-user-list>

    <app-user-detail
      [selectedActor]="openedActor"
      (deselected)="onActorDeselected()"
    ></app-user-detail>

    <app-history-panel></app-history-panel>
  </div>
</section>
