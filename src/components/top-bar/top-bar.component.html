<header class="header-bar">
  <div class="header-info" *ngIf="currentActor">
    <strong>{{ currentActor.first }} {{ currentActor.last }}</strong>
    <span>Session: {{ sessionStart | date : 'dd.MM.yyyy HH:mm:ss' }}</span>
    <span>Interactions: {{ clicks }}</span>
  </div>

  <div class="header-controls">
    <label for="search-input">Search by last name</label>
    <input
      id="search-input"
      type="text"
      [ngModel]="query"
      (ngModelChange)="onSearchInput($event)"
      placeholder="e.g. Smith"
    />

    <button type="button" (click)="handleLogout()">Sign Out</button>
  </div>
</header>
